<!DOCTYPE html>
<html lang="en">
<head>
    <title>Rail Fence Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
    <div class="container mt-5">
        <table class="table table-bordered">
            <tr>
                <td style="text-align: center; font-weight: bold; font-size: 25px;" colspan="2">
                    RAIL FENCE CIPHER
                </td>
            </tr>
            
            <tr>
                <td style="font-weight: bold; color: blue; width: 50%;">ENCRYPTION</td>
                <td style="font-weight: bold; color: green; width: 50%;">DECRYPTION</td>
            </tr>
            <tr>
                <td style="vertical-align: top;">
                    <form method="POST" action="/railfence_encrypt">
                        <div class="mb-3">
                            <label class="form-label">Plain text:</label>
                            <input type="text" class="form-control" name="inputPlainText" 
                                   value="{{ plain_text_old if plain_text_old else '' }}" 
                                   placeholder="Input Plain Text" required autofocus/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Key (Number of Rails):</label>
                            <input type="number" class="form-control" name="inputKeyPlain" 
                                   value="{{ key_plain_old if key_plain_old else '' }}" 
                                   placeholder="Input Key" required/>
                        </div>
                        <button type="submit" class="btn btn-primary">Encrypt</button>
                    </form>

                    {% if encrypted_result %}
                    <div class="alert alert-info mt-3" style="word-wrap: break-word;">
                        <strong>Bản mã (Cipher text):</strong> <br>
                        {{ encrypted_result }}
                    </div>
                    {% endif %}
                </td>
                
                <td style="vertical-align: top;">
                    <form method="POST" action="/railfence_decrypt">
                        <div class="mb-3">
                            <label class="form-label">Cipher text:</label>
                            <input type="text" class="form-control" name="inputCipherText" 
                                   value="{{ cipher_text_old if cipher_text_old else '' }}" 
                                   placeholder="Input Cipher Text" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Key (Number of Rails):</label>
                            <input type="number" class="form-control" name="inputKeyCipher" 
                                   value="{{ key_cipher_old if key_cipher_old else '' }}" 
                                   placeholder="Input Key" required/>
                        </div>
                        <button type="submit" class="btn btn-success">Decrypt</button>
                    </form>

                    {% if decrypted_result %}
                    <div class="alert alert-success mt-3" style="word-wrap: break-word;">
                        <strong>Bản rõ (Plain text):</strong> <br>
                        {{ decrypted_result }}
                    </div>
                    {% endif %}
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
